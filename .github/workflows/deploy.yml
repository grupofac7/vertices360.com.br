name: Deploy CRM

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Backend
        working-directory: backend
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Build Frontend
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Docker Build & Push
        run: |
          docker build -t crm-backend ./backend
          docker build -t crm-frontend ./frontend

      - name: Deploy via SSH
        run: echo "Add your deploy commands here"
